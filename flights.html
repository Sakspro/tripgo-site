<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cheap flight deals from your area — one-way fares to Tokyo, Bangkok, Dubai and more on TripGo." />
  <title>Flight Deals | TripGo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a href="index.html" class="brand notranslate" translate="no" aria-label="TripGo home"><span class="brand__mark">✈</span>Trip<span>Go</span>.com</a>
      <div class="globalsearch">
        <span class="globalsearch__icon">🔍</span>
        <input type="text" placeholder="Destinations, attractions, hotels, and more" aria-label="Search the site" />
      </div>
      <nav class="topbar__links">
        <a href="app.html" class="topbar__link"><span>📱</span> App</a>
        <a href="list-property.html" class="topbar__link">List your property</a>
        <button class="topbar__link dd-trigger" id="currTrigger" aria-haspopup="true" aria-expanded="false">
          <span>🌐</span> <span id="currLabel">USD</span> <span class="caret">▾</span>
        </button>
        <a href="support.html" class="topbar__link">Customer support</a>
        <a href="bookings.html" class="topbar__link">Find bookings</a>
        <a href="index.html" class="btn btn--outline btn--sm" data-signin>Sign in / register</a>
      </nav>
    </div>
  </header>

  <main class="fltpage container">
    <nav class="bk-crumbs"><a href="index.html">Home</a> <span>›</span> Flight deals</nav>
    <h1 class="flt-title">Get inspired for your next trip</h1>
    <p class="flt-sub">Explore one-way flights from your area</p>

    <div class="chips-wrap">
      <div class="chips" id="fltChips"></div>
      <button type="button" class="chips-next" id="fltNext" aria-label="Scroll destinations">›</button>
    </div>

    <div class="flt-grid" id="fltGrid"></div>
  </main>

  <footer class="footer container">
    <div class="footer__bottom">© <span id="year"></span> TripGo Travel. &nbsp;·&nbsp; 🌐 English (XX) · USD</div>
  </footer>

  <script src="i18n.js"></script>
  <script src="region.js"></script>
  <script src="signin.js"></script>
  <script src="common.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
    try { var c = localStorage.getItem("tg_curr"); var lc = document.getElementById("currLabel"); if (c && lc) lc.textContent = c; } catch (e) {}

    var CHIPS = ["Anywhere", "Tokyo", "Seoul", "Bangkok", "Singapore", "Istanbul", "Dubai", "Hanoi", "Doha", "Bali"];
    var FLIGHTS = [
      { dest: "Tokyo", country: "Japan", price: 489, img: "photo-1540959733332-eab4deab993a", tag: "Tokyo" },
      { dest: "Seoul", country: "South Korea", price: 412, img: "photo-1517154429929-933367bd8490", tag: "Seoul" },
      { dest: "Bangkok", country: "Thailand", price: 378, img: "photo-1563492065593-0444c1d2e0a0", tag: "Bangkok" },
      { dest: "Singapore", country: "Singapore", price: 445, img: "photo-1525625293386-3f8f99389edd", tag: "Singapore" },
      { dest: "Istanbul", country: "Türkiye", price: 356, img: "photo-1527837756880-4a2081e79182", tag: "Istanbul" },
      { dest: "Dubai", country: "UAE", price: 398, img: "photo-1512453979798-5ea266f8880c", tag: "Dubai" },
      { dest: "Hanoi", country: "Vietnam", price: 289, img: "photo-1597003723278-d8a42a6e3661", tag: "Hanoi" },
      { dest: "Doha", country: "Qatar", price: 421, img: "photo-1580844481067-5edc1a8e91c8", tag: "Doha" },
      { dest: "Bali", country: "Indonesia", price: 334, img: "photo-1537996194471-e657df975ab4", tag: "Bali" },
      { dest: "Hong Kong", country: "China", price: 401, img: "photo-1536599018102-cb9629e9bd30", tag: "Hong Kong" }
    ];
    var IMG = function (id) { return "https://images.unsplash.com/" + id + "?auto=format&fit=crop&w=500&q=80"; };
    var chip = new URLSearchParams(location.search).get("dest") || "Anywhere";
    if (CHIPS.indexOf(chip) === -1) chip = "Anywhere";

    function card(f) {
      return '<a class="flight-card flight-card--lg" href="index.html?tab=flights&to=' + encodeURIComponent(f.dest) + '#search">' +
        '<div class="flight-card__img"><img loading="lazy" src="' + IMG(f.img) + '" alt="' + f.dest + '" /></div>' +
        '<div class="flight-card__body"><div class="flight-card__city">' + f.dest + '</div>' +
        '<div class="flight-card__sub">' + f.country + ' · One-way</div>' +
        '<div class="flight-card__price">from <b>US$' + f.price + '</b></div></div></a>';
    }
    function render() {
      var list = chip === "Anywhere" ? FLIGHTS : FLIGHTS.filter(function (f) { return f.tag === chip; });
      document.getElementById("fltGrid").innerHTML = list.map(card).join("");
      document.getElementById("fltChips").innerHTML = CHIPS.map(function (c) {
        return '<button type="button" class="chip ' + (c === chip ? "is-active" : "") + '" data-dest="' + c + '">' + c + '</button>';
      }).join("");
    }
    render();
    document.getElementById("fltChips").addEventListener("click", function (e) {
      var b = e.target.closest("[data-dest]"); if (!b) return;
      chip = b.dataset.dest;
      history.replaceState(null, "", chip === "Anywhere" ? "flights.html" : "flights.html?dest=" + encodeURIComponent(chip));
      render();
    });
    document.getElementById("fltNext").addEventListener("click", function () {
      document.getElementById("fltChips").scrollBy({ left: 220, behavior: "smooth" });
    });
  </script>
</body>
</html>

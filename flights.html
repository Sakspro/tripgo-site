<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cheap flight deals from your area — one-way fares synced from Trip.com on TripGo." />
  <title>Flight Deals | TripGo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a href="index.html" class="brand notranslate" translate="no" aria-label="TripGo home"><span class="brand__mark">✈</span>Trip<span>Go</span>.com</a>
      <div class="globalsearch">
        <span class="globalsearch__icon">🔍</span>
        <input type="text" placeholder="Destinations, attractions, hotels, and more" aria-label="Search the site" />
      </div>
      <nav class="topbar__links">
        <a href="app.html" class="topbar__link"><span>📱</span> App</a>
        <a href="list-property.html" class="topbar__link">List your property</a>
        <button class="topbar__link dd-trigger" id="currTrigger" aria-haspopup="true" aria-expanded="false">
          <span>🌐</span> <span id="currLabel">USD</span> <span class="caret">▾</span>
        </button>
        <a href="support.html" class="topbar__link">Customer support</a>
        <a href="bookings.html" class="topbar__link">Find bookings</a>
        <a href="index.html" class="btn btn--outline btn--sm" data-signin>Sign in / register</a>
      </nav>
    </div>
  </header>

  <main class="fltpage container">
    <nav class="bk-crumbs"><a href="index.html">Home</a> <span>›</span> Flight deals</nav>
    <h1 class="flt-title" id="fltTitle">Get inspired for your next trip</h1>
    <p class="flt-sub" id="fltSub">Explore one-way flights from your area</p>

    <div class="chips-wrap">
      <div class="chips" id="fltChips"></div>
      <button type="button" class="chips-next" id="fltNext" aria-label="Scroll destinations">›</button>
    </div>

    <div class="flt-grid" id="fltGrid"></div>
    <p class="flt-sync" id="fltSync" hidden></p>
  </main>

  <footer class="footer container">
    <div class="footer__bottom">© <span id="year"></span> TripGo Travel. &nbsp;·&nbsp; 🌐 English (XX) · USD</div>
  </footer>

  <script src="i18n.js"></script>
  <script src="region.js"></script>
  <script src="signin.js"></script>
  <script src="dest-search.js"></script>
  <script src="common.js"></script>
  <script src="inspired.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
    try { var c = localStorage.getItem("tg_curr"); var lc = document.getElementById("currLabel"); if (c && lc) lc.textContent = c; } catch (e) {}

    var CHIPS = ["Anywhere"];
    var FLIGHTS = [];
    var chip = new URLSearchParams(location.search).get("dest") || "Anywhere";

    function flightImg(f) {
      if (f.img && (f.img.indexOf("http") === 0 || f.img.indexOf("//") === 0)) {
        return f.img.indexOf("//") === 0 ? "https:" + f.img : f.img;
      }
      return "https://images.unsplash.com/" + f.img + "?auto=format&fit=crop&w=500&q=80";
    }
    function card(f) {
      var href = f.deeplink || ("results.html?tab=flights&to=" + encodeURIComponent(f.dest));
      var ext = f.deeplink ? ' target="_blank" rel="noopener"' : "";
      var price = (f.browseOnly || !f.price)
        ? '<div class="flight-card__price">Explore <b>flights</b></div>'
        : '<div class="flight-card__price">from <b>US$' + f.price + '</b></div>';
      return '<a class="flight-card flight-card--lg" href="' + href + '"' + ext + '>' +
        '<div class="flight-card__img"><img loading="lazy" src="' + flightImg(f) + '" alt="' + f.dest + '" /></div>' +
        '<div class="flight-card__body"><div class="flight-card__city">' + f.dest + '</div>' +
        '<div class="flight-card__sub">' + (f.country || "One-way") + '</div>' + price + '</div></a>';
    }
    function render() {
      if (CHIPS.indexOf(chip) === -1) chip = "Anywhere";
      var list = chip === "Anywhere" ? FLIGHTS : FLIGHTS.filter(function (f) { return f.tag === chip || f.dest === chip; });
      document.getElementById("fltGrid").innerHTML = list.length
        ? list.map(card).join("")
        : '<div class="flight-empty">No flights found for this destination yet.</div>';
      document.getElementById("fltChips").innerHTML = CHIPS.map(function (c) {
        return '<button type="button" class="chip ' + (c === chip ? "is-active" : "") + '" data-dest="' + c + '">' + c + '</button>';
      }).join("");
    }
    function apply(data) {
      if (!data) return;
      if (data.chips && data.chips.length) CHIPS = data.chips;
      if (data.flights && data.flights.length) FLIGHTS = data.flights;
      if (data.title) document.getElementById("fltTitle").textContent = data.title;
      if (data.subtitle) document.getElementById("fltSub").textContent = data.subtitle;
      if (data.syncedAt) {
        var s = document.getElementById("fltSync");
        s.hidden = false;
        s.textContent = "Synced from Trip.com · " + new Date(data.syncedAt).toLocaleString();
      }
      render();
    }
    render();
    if (window.TGinspiredReady) window.TGinspiredReady.then(apply);
    document.addEventListener("tg-inspired", function (e) { apply(e.detail); });

    document.getElementById("fltChips").addEventListener("click", function (e) {
      var b = e.target.closest("[data-dest]"); if (!b) return;
      chip = b.dataset.dest;
      history.replaceState(null, "", chip === "Anywhere" ? "flights.html" : "flights.html?dest=" + encodeURIComponent(chip));
      render();
    });
    document.getElementById("fltNext").addEventListener("click", function () {
      document.getElementById("fltChips").scrollBy({ left: 220, behavior: "smooth" });
    });
  </script>
</body>
</html>

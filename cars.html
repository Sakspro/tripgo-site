<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Compare car rental deals worldwide — search pick-up location and dates on TripGo." />
  <title>Car Rentals | TripGo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a href="index.html" class="brand notranslate" translate="no" aria-label="TripGo home"><span class="brand__mark">✈</span>Trip<span>Go</span>.com</a>
      <div class="globalsearch">
        <span class="globalsearch__icon">🔍</span>
        <input type="text" placeholder="Destinations, attractions, hotels, and more" aria-label="Search the site" />
      </div>
      <nav class="topbar__links">
        <a href="app.html" class="topbar__link"><span>📱</span> App</a>
        <a href="list-property.html" class="topbar__link">List your property</a>
        <button class="topbar__link dd-trigger" id="currTrigger"><span>🌐</span> <span id="currLabel">USD</span> <span class="caret">▾</span></button>
        <a href="support.html" class="topbar__link">Customer support</a>
        <a href="bookings.html" class="topbar__link">Find bookings</a>
        <a href="index.html" class="btn btn--outline btn--sm" data-signin>Sign in / register</a>
      </nav>
    </div>
  </header>

  <main class="fltpage container">
    <nav class="bk-crumbs"><a href="index.html">Home</a> <span>›</span> Car Rentals</nav>
    <h1 class="flt-title">Car Rentals</h1>
    <p class="flt-sub">Search rental cars at airports and city locations worldwide</p>

    <form class="cars-form" id="carsForm" action="results.html" method="get">
      <input type="hidden" name="tab" value="cars" />
      <div class="cars-form__row">
        <label class="cars-form__field cars-form__field--grow">
          <span class="cars-form__label">Pick-up location</span>
          <input type="text" name="dest" required placeholder="Airport or city" value="Los Angeles Airport (LAX)" />
        </label>
        <label class="cars-form__field">
          <span class="cars-form__label">Pick-up date</span>
          <input type="date" name="in" id="pickIn" required />
        </label>
        <label class="cars-form__field">
          <span class="cars-form__label">Drop-off date</span>
          <input type="date" name="out" id="pickOut" required />
        </label>
        <div class="cars-form__field cars-form__field--btn">
          <button type="submit" class="btn btn--primary">🔍 Search</button>
        </div>
      </div>
      <p class="cars-form__note">✓ Return car to same location</p>
    </form>

    <section class="block" style="margin-top:28px">
      <h2 class="block__title">Popular pick-up locations</h2>
      <div class="chips" id="carChips"></div>
    </section>
  </main>

  <footer class="footer container">
    <div class="footer__bottom">© <span id="year"></span> TripGo Travel. &nbsp;·&nbsp; 🌐 English (XX) · USD</div>
  </footer>

  <script src="i18n.js"></script>
  <script src="region.js"></script>
  <script src="signin.js"></script>
  <script src="common.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
    try { var c = localStorage.getItem("tg_curr"); var lc = document.getElementById("currLabel"); if (c && lc) lc.textContent = c; } catch (e) {}

    var today = new Date();
    var out = new Date(today); out.setDate(out.getDate() + 3);
    var fmt = function (d) { return d.toISOString().slice(0, 10); };
    document.getElementById("pickIn").value = fmt(today);
    document.getElementById("pickOut").value = fmt(out);

    var LOCS = ["Los Angeles (LAX)", "New York (JFK)", "London (LHR)", "Paris (CDG)", "Dubai (DXB)", "Tokyo (NRT)", "Singapore (SIN)", "Sydney (SYD)"];
    document.getElementById("carChips").innerHTML = LOCS.map(function (loc) {
      return '<a class="chip" href="results.html?tab=cars&dest=' + encodeURIComponent(loc) + '">' + loc + '</a>';
    }).join("");
  </script>
</body>
</html>
